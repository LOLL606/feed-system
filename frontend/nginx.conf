# 仅供讲师机部署
# 学生不需要前端，用 Postman/Swagger 测试自己的后端 API
#
# 讲师演示时：
#   1. 将 upstream 改为被演示组的虚拟机 IP
#   2. nginx -s reload
#   3. 全班浏览器访问讲师机 IP:8081

upstream backend {
    # 默认指向讲师机后端，演示时改为学生组 IP
    server 127.0.0.1:8080;
}

server {
    listen 8081;
    server_name _;

    root /opt/feed-system/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理到后端
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

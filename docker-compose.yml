# ========================================
# Feed 流系统 — Docker Compose 基础设施
# ========================================
# 使用方式：
#   Day1-2（仅主库）：docker-compose up -d
#   Day3+（主从）：   docker-compose --profile day3 up -d
#   停止：           docker-compose down
#   清空数据：       docker-compose down -v
# ========================================

services:
  # ---- MySQL 主库（Day1 起使用）----
  mysql-master:
    image: mysql:8.0
    container_name: feed-mysql-master
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: feed_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      # 初始化脚本（首次启动自动执行，按文件名排序）
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/mock-data.sql:/docker-entrypoint-initdb.d/02-mock-data.sql:ro
      # 数据持久化
      - mysql-master-data:/var/lib/mysql
      # 主从复制配置（Day3 启用）
      - ./mysql/master.cnf:/etc/mysql/conf.d/master.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - feed-net

  # ---- MySQL 从库（Day3 读写分离）----
  mysql-slave:
    image: mysql:8.0
    container_name: feed-mysql-slave
    restart: unless-stopped
    profiles:
      - day3
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - feed-net

volumes:
  mysql-master-data:
  mysql-slave-data:

networks:
  feed-net:
    driver: bridge
